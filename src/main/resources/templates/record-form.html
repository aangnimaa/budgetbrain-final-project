<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${mode == 'create'} ? 'New Record | BudgetBrain' : 'Edit Record | BudgetBrain'">Record</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="topbar">
    <a class="brand" th:href="@{/dashboard}"><span class="logo">₩</span> BudgetBrain</a>
    <div class="nav-links">
        <a th:href="@{/dashboard}">Dashboard</a>
        <a class="active" th:href="@{/records}">Records</a>
        <a th:href="@{/budgets}">Budgets</a>
        <a th:href="@{/goals}">Goals</a>
        <form th:action="@{/logout}" method="post" class="logout-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Logout</button>
        </form>
    </div>
</nav>

<main class="container narrow">
    <section class="page-heading">
        <p class="eyebrow" th:text="${mode == 'create'} ? 'Add transaction' : 'Update transaction'"></p>
        <h1 th:text="${mode == 'create'} ? 'Create finance record' : 'Edit finance record'"></h1>
        <p>Record income or expense details and attach a receipt image if available.</p>
    </section>

    <form th:action="${formAction}" th:object="${record}" method="post" enctype="multipart/form-data" class="form-card">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="form-grid">
            <div class="field span-two">
                <label>Title</label>
                <input type="text" th:field="*{title}" placeholder="Example: Lunch at cafeteria" required>
            </div>
            <div class="field">
                <label>Type</label>
                <select th:field="*{type}" required>
                    <option th:each="type : ${types}" th:value="${type}" th:text="${type}"></option>
                </select>
            </div>
            <div class="field">
                <label>Category</label>
                <select th:field="*{category}" required>
                    <option value="">Select category</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Study">Study</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Salary">Salary</option>
                    <option value="Part-time Job">Part-time Job</option>
                    <option value="Bills">Bills</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="field">
                <label>Amount KRW</label>
                <input type="number" th:field="*{amount}" min="1" step="100" placeholder="12000" required>
            </div>
            <div class="field">
                <label>Date</label>
                <input type="date" th:field="*{recordDate}" required>
            </div>
            <div class="field span-two">
                <label>Receipt Image</label>
                <input type="file" name="imageFile" accept="image/*">
                <small th:if="${record.receiptImagePath != null}">Current receipt is already uploaded. Upload a new image to replace it.</small>
            </div>
            <div class="field span-two">
                <label>Note</label>
                <textarea th:field="*{note}" rows="4" placeholder="Add extra details, payment method, or receipt notes"></textarea>
            </div>
        </div>
        <div class="form-actions">
            <a class="btn btn-soft" th:href="@{/records}">Cancel</a>
            <button class="btn btn-primary" type="submit" th:text="${mode == 'create'} ? 'Create Record' : 'Save Changes'"></button>
        </div>
    </form>
</main>
</body>
</html>
