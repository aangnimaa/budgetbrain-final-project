<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BudgetBrain</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
<div class="auth-shell">
    <a class="brand center-brand" th:href="@{/}"><span class="logo">₩</span> BudgetBrain</a>
    <div class="auth-card">
        <p class="eyebrow">Welcome back</p>
        <h1>Login to your account</h1>
        <div th:if="${param.error}" class="alert danger">Invalid username or password.</div>
        <div th:if="${param.registered}" class="alert success">Registration successful. Please login.</div>
        <div th:if="${param.logout}" class="alert success">You have logged out.</div>
        <form th:action="@{/login}" method="post" class="stack-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required>
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
            <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>
        <p class="switch-link">No account? <a th:href="@{/register}">Create one</a></p>
    </div>
</div>
</body>
</html>
