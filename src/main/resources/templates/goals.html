<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings Goals | BudgetBrain</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="topbar">
    <a class="brand" th:href="@{/dashboard}"><span class="logo">₩</span> BudgetBrain</a>
    <div class="nav-links">
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/records}">Records</a>
        <a th:href="@{/budgets}">Budgets</a>
        <a class="active" th:href="@{/goals}">Goals</a>
        <form th:action="@{/logout}" method="post" class="logout-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Logout</button>
        </form>
    </div>
</nav>

<main class="container">
    <section class="page-heading row-heading">
        <div>
            <p class="eyebrow">Savings tracker</p>
            <h1>Savings Goals</h1>
            <p>Create goals and update the saved amount as you make progress.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/goals/new}">+ New Goal</a>
    </section>

    <div th:if="${success}" class="alert success" th:text="${success}"></div>

    <form th:action="@{/goals}" method="get" class="search-bar">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="Search by goal name or note">
        <button class="btn btn-soft" type="submit">Search</button>
        <a th:href="@{/goals}">Clear</a>
    </form>

    <section class="card-grid" th:if="${!#lists.isEmpty(goals)}">
        <article class="goal-card" th:each="goal : ${goals}">
            <div class="card-head">
                <span th:text="${goal.deadline != null ? goal.deadline : 'No deadline'}">Deadline</span>
                <strong th:text="${goal.name}">Goal</strong>
            </div>
            <div class="goal-progress-big">
                <span th:text="|${goal.progressPercent}%|">0%</span>
                <div class="progress"><span th:style="|width:${goal.progressPercent}%|"></span></div>
            </div>
            <p th:text="|₩${goal.savedAmount} saved of ₩${goal.targetAmount}|"></p>
            <small th:text="${goal.note}"></small>
            <div class="action-row">
                <a th:href="@{'/goals/' + ${goal.id} + '/edit'}">Edit</a>
                <form th:action="@{'/goals/' + ${goal.id} + '/delete'}" method="post" onsubmit="return confirm('Delete this goal?');">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit">Delete</button>
                </form>
            </div>
        </article>
    </section>

    <section th:if="${#lists.isEmpty(goals)}" class="empty-state">
        <h2>No savings goals found</h2>
        <p>Create a savings goal for laptop, travel, tuition, or emergency money.</p>
        <a class="btn btn-primary" th:href="@{/goals/new}">Create Goal</a>
    </section>
</main>
</body>
</html>
