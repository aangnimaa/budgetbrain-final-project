<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${mode == 'create'} ? 'New Goal | BudgetBrain' : 'Edit Goal | BudgetBrain'">Goal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="topbar">
    <a class="brand" th:href="@{/dashboard}"><span class="logo">₩</span> BudgetBrain</a>
    <div class="nav-links">
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/records}">Records</a>
        <a th:href="@{/budgets}">Budgets</a>
        <a class="active" th:href="@{/goals}">Goals</a>
        <form th:action="@{/logout}" method="post" class="logout-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Logout</button>
        </form>
    </div>
</nav>

<main class="container narrow">
    <section class="page-heading">
        <p class="eyebrow" th:text="${mode == 'create'} ? 'New saving target' : 'Update progress'"></p>
        <h1 th:text="${mode == 'create'} ? 'Create savings goal' : 'Edit savings goal'"></h1>
        <p>Set a target amount and update your saved amount when you save more money.</p>
    </section>

    <form th:action="${formAction}" th:object="${goal}" method="post" class="form-card">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="form-grid">
            <div class="field span-two">
                <label>Goal Name</label>
                <input type="text" th:field="*{name}" placeholder="Example: New laptop" required>
            </div>
            <div class="field">
                <label>Target Amount KRW</label>
                <input type="number" th:field="*{targetAmount}" min="1" step="100" placeholder="1000000" required>
            </div>
            <div class="field">
                <label>Saved Amount KRW</label>
                <input type="number" th:field="*{savedAmount}" min="0" step="100" placeholder="250000" required>
            </div>
            <div class="field span-two">
                <label>Deadline</label>
                <input type="date" th:field="*{deadline}">
            </div>
            <div class="field span-two">
                <label>Note</label>
                <textarea th:field="*{note}" rows="4" placeholder="Why this goal is important"></textarea>
            </div>
        </div>
        <div class="form-actions">
            <a class="btn btn-soft" th:href="@{/goals}">Cancel</a>
            <button class="btn btn-primary" type="submit" th:text="${mode == 'create'} ? 'Create Goal' : 'Save Changes'"></button>
        </div>
    </form>
</main>
</body>
</html>
