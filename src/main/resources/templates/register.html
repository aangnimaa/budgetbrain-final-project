<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | BudgetBrain</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
<div class="auth-shell">
    <a class="brand center-brand" th:href="@{/}"><span class="logo">₩</span> BudgetBrain</a>
    <div class="auth-card wide">
        <p class="eyebrow">Create finance profile</p>
        <h1>Start tracking your money</h1>
        <div th:if="${error}" class="alert danger" th:text="${error}"></div>
        <form th:action="@{/register}" th:object="${user}" method="post" class="stack-form two-col">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div>
                <label>Full Name</label>
                <input type="text" th:field="*{fullName}" placeholder="Your name" required>
            </div>
            <div>
                <label>Email</label>
                <input type="email" th:field="*{email}" placeholder="your@email.com" required>
            </div>
            <div>
                <label>Username</label>
                <input type="text" th:field="*{username}" placeholder="Choose username" required>
            </div>
            <div>
                <label>Password</label>
                <input type="password" th:field="*{password}" placeholder="Create password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full span-two">Create Account</button>
        </form>
        <p class="switch-link">Already registered? <a th:href="@{/login}">Login</a></p>
    </div>
</div>
</body>
</html>
