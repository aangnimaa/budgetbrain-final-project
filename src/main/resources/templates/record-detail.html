<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${record.title} + ' | BudgetBrain'">Record Detail</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="topbar">
    <a class="brand" th:href="@{/dashboard}"><span class="logo">₩</span> BudgetBrain</a>
    <div class="nav-links">
        <a th:href="@{/dashboard}">Dashboard</a>
        <a class="active" th:href="@{/records}">Records</a>
        <a th:href="@{/budgets}">Budgets</a>
        <a th:href="@{/goals}">Goals</a>
        <form th:action="@{/logout}" method="post" class="logout-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Logout</button>
        </form>
    </div>
</nav>

<main class="container detail-shell">
    <section class="detail-media">
        <img th:if="${record.receiptImagePath != null}" th:src="${record.receiptImagePath}" alt="Receipt image">
        <div th:if="${record.receiptImagePath == null}" class="image-placeholder">No receipt image uploaded</div>
    </section>

    <section class="detail-content">
        <p class="eyebrow" th:text="${record.type}">EXPENSE</p>
        <h1 th:text="${record.title}">Record title</h1>
        <p th:text="${record.note}">Record note</p>
        <div class="detail-grid">
            <div><strong>Amount</strong><span th:text="|₩${record.amount}|">₩0</span></div>
            <div><strong>Category</strong><span th:text="${record.category}">Food</span></div>
            <div><strong>Date</strong><span th:text="${record.recordDate}">2026-06-19</span></div>
            <div><strong>Created</strong><span th:text="${#temporals.format(record.createdAt, 'yyyy-MM-dd HH:mm')}"></span></div>
        </div>
        <div class="form-actions">
            <a class="btn btn-soft" th:href="@{/records}">Back</a>
            <a class="btn btn-primary" th:href="@{'/records/' + ${record.id} + '/edit'}">Edit</a>
            <form th:action="@{'/records/' + ${record.id} + '/delete'}" method="post" onsubmit="return confirm('Delete this record?');">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-danger" type="submit">Delete</button>
            </form>
        </div>
    </section>
</main>
</body>
</html>
