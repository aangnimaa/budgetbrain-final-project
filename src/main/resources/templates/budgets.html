<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budgets | BudgetBrain</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="topbar">
    <a class="brand" th:href="@{/dashboard}"><span class="logo">₩</span> BudgetBrain</a>
    <div class="nav-links">
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/records}">Records</a>
        <a class="active" th:href="@{/budgets}">Budgets</a>
        <a th:href="@{/goals}">Goals</a>
        <form th:action="@{/logout}" method="post" class="logout-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Logout</button>
        </form>
    </div>
</nav>

<main class="container">
    <section class="page-heading row-heading">
        <div>
            <p class="eyebrow">Budget planning</p>
            <h1>Monthly Budgets</h1>
            <p>Create monthly limits for food, transport, study, bills, and other categories.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/budgets/new}">+ New Budget</a>
    </section>

    <div th:if="${success}" class="alert success" th:text="${success}"></div>

    <form th:action="@{/budgets}" method="get" class="search-bar">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="Search by category, month, or note">
        <button class="btn btn-soft" type="submit">Search</button>
        <a th:href="@{/budgets}">Clear</a>
    </form>

    <section class="card-grid" th:if="${!#lists.isEmpty(budgets)}">
        <article class="budget-card" th:each="budget : ${budgets}">
            <div class="card-head">
                <span th:text="${budget.month}">2026-06</span>
                <strong th:text="${budget.category}">Food</strong>
            </div>
            <h2 th:text="|₩${budget.limitAmount}|">₩0</h2>
            <p th:text="${budget.note}">Budget note</p>
            <div class="action-row">
                <a th:href="@{'/budgets/' + ${budget.id} + '/edit'}">Edit</a>
                <form th:action="@{'/budgets/' + ${budget.id} + '/delete'}" method="post" onsubmit="return confirm('Delete this budget?');">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit">Delete</button>
                </form>
            </div>
        </article>
    </section>

    <section th:if="${#lists.isEmpty(budgets)}" class="empty-state">
        <h2>No budgets found</h2>
        <p>Add your first monthly budget category.</p>
        <a class="btn btn-primary" th:href="@{/budgets/new}">Create Budget</a>
    </section>
</main>
</body>
</html>
